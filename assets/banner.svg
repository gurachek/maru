<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 210" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" role="img" aria-label="maru — Laravel engineering discipline for your AI coding agent, enforced at edit-time.">
  <defs>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3fb950"/>
      <stop offset="0.55" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="812" height="202" rx="18" fill="url(#bg)" stroke="#30363d" stroke-width="1.5"/>

  <!-- faint terminal dots, top-left -->
  <circle cx="34" cy="30" r="5" fill="#ff5f56" opacity="0.7"/>
  <circle cx="52" cy="30" r="5" fill="#ffbd2e" opacity="0.7"/>
  <circle cx="70" cy="30" r="5" fill="#27c93f" opacity="0.7"/>

  <!-- wordmark -->
  <text x="410" y="104" text-anchor="middle" font-size="76" font-weight="bold" letter-spacing="2" fill="url(#word)">maru <tspan fill="#e6edf3" font-weight="normal">◯</tspan></text>

  <!-- tagline -->
  <text x="410" y="146" text-anchor="middle" font-size="17" fill="#8b949e">Laravel discipline for your AI coding agent — <tspan fill="#c9d1d9">enforced at edit-time.</tspan></text>

  <!-- three-layer motif, colored ascii style -->
  <text x="410" y="182" text-anchor="middle" font-size="16" letter-spacing="0.5"><tspan fill="#3fb950">① skills</tspan><tspan fill="#6e7681">  →  </tspan><tspan fill="#58a6ff">② agents</tspan><tspan fill="#6e7681">  →  </tspan><tspan fill="#f0883e">③ hooks</tspan></text>
</svg>
