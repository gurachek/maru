<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" role="img" aria-label="A Claude Code agent runs php artisan migrate:fresh and maru blocks it before execution.">
  <style>
    /* One 15s timeline, shared by every line so they stay in sync while looping. */
    .line { opacity: 0; }
    .l1 { animation: r1 15s infinite; }
    .l2 { animation: r2 15s infinite; }
    .l3 { animation: r3 15s infinite; }
    .l4 { animation: r4 15s infinite; }
    .l5 { animation: r5 15s infinite; }
    .l6 { animation: r6 15s infinite; }
    .cur { animation: blink 1s steps(1) infinite; }
    @keyframes r1 { 0%,3%{opacity:0} 4%,95%{opacity:1} 97%,100%{opacity:0} }
    @keyframes r2 { 0%,12%{opacity:0} 13%,95%{opacity:1} 97%,100%{opacity:0} }
    @keyframes r3 { 0%,20%{opacity:0} 21%,95%{opacity:1} 97%,100%{opacity:0} }
    @keyframes r4 { 0%,33%{opacity:0} 34%,95%{opacity:1} 97%,100%{opacity:0} }
    @keyframes r5 { 0%,37%{opacity:0} 38%,95%{opacity:1} 97%,100%{opacity:0} }
    @keyframes r6 { 0%,57%{opacity:0} 58%,95%{opacity:1} 97%,100%{opacity:0} }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  </style>

  <!-- window -->
  <rect x="10" y="10" width="800" height="400" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <line x1="10" y1="52" x2="810" y2="52" stroke="#30363d" stroke-width="1"/>
  <circle cx="38" cy="31" r="7" fill="#ff5f56"/>
  <circle cx="62" cy="31" r="7" fill="#ffbd2e"/>
  <circle cx="86" cy="31" r="7" fill="#27c93f"/>
  <text x="410" y="36" text-anchor="middle" font-size="14" fill="#6e7681">vesna-app — zsh</text>

  <!-- content -->
  <g font-size="19">
    <text class="line l1" x="40" y="96" fill="#6e7681"># Claude Code — mid-feature on a production Laravel app</text>

    <text class="line l2" x="40" y="132" fill="#8b949e">the agent decides to reset the database…</text>

    <g class="line l3">
      <text x="40" y="178"><tspan fill="#3fb950">$ </tspan><tspan fill="#e6edf3">php artisan migrate:fresh --seed</tspan></text>
      <rect class="cur" x="440" y="162" width="10" height="21" fill="#e6edf3"/>
    </g>

    <g class="line l4">
      <circle cx="49" cy="219" r="10" fill="#f85149"/>
      <rect x="43" y="215.5" width="12" height="7" rx="1" fill="#0d1117" transform="rotate(-45 49 219)"/>
      <text x="70" y="226" fill="#f85149" font-weight="bold">maru: blocked `migrate:fresh` — this drops every table.</text>
    </g>
    <text class="line l5" x="70" y="256" fill="#c98b8b">refused before it ran. nothing was lost.</text>

    <text class="line l6" x="40" y="302" fill="#3fb950"># a deterministic hook the agent can't rationalize past.</text>
  </g>

  <!-- footer / brand -->
  <text x="40" y="360" font-size="20"><tspan fill="#e6edf3" font-weight="bold">maru ◯</tspan><tspan fill="#6e7681">   github.com/gurachek/maru</tspan></text>
</svg>
